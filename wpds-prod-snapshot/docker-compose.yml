version: '3.8'

services:
  wpds1:
    container_name: wpds1
    build: .
    restart: unless-stopped
    cpus: 0.5
    volumes:
      - ./data:/app/data  # ✅ DB UNIFIÉE partagée
      - ./proxy-lists:/app/data/proxy-lists
    environment:
      - TOR_HOST=172.18.0.1
      - TOR_PORT_START=30000
      - TOR_PORT_END=30099
      - TOR_PORTS_COUNT=100
      # ✅ Couverture exhaustive : wpds1 scanne 1 → 167M
      - INSTANCE_ID=1
      - RETRY_ONLY=false
      - SCAN_START=1
      - SCAN_END=167000000
      - CF_WORKER_SECRET=${CF_WORKER_SECRET}
      - CF_WORKER_URL=${CF_WORKER_URL}
    ports:
      - "4242:4242"
    networks:
      - infra_default

  wpds2:
